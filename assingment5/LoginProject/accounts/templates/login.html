<!DOCTYPE html>
<html>
<head>
    <title>Simple Login</title>
</head>
<body>

<h2>Login Form</h2>

<form method="POST">
    {% csrf_token %}
    
    Username: <input type="text" name="username"><br><br>
    Password: <input type="password" name="password"><br><br>
    
    <button type="submit">Login</button>
</form>

<br>

<!-- VERY IMPORTANT LINE -->
<h3 style="color:red;">
    {{ message }}
</h3>

</body>
</html>
