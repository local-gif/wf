<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Form Validation</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow p-4" style="width: 600px;">
        <h4 class="text-center mb-4">Login Form</h4>

        <form onsubmit="return validateLogin()">

            <div class="alert d-none text-center" id="alertMessage"></div>

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" id="username" class="form-control" placeholder="Enter username">
                <small class="text-danger" id="usernameError"></small>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="text" id="email" class="form-control" placeholder="Enter email">
                <small class="text-danger" id="emailError"></small>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Enter password">
                <small class="text-danger" id="passwordError"></small>
            </div>

            <button type="submit" class="btn btn-primary w-100">Login</button>

        </form>
    </div>
</div>

<script>
function validateLogin() {

    let username = document.getElementById("username").value.trim();
    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value.trim();

    let usernamePattern = /^[A-Za-z0-9]{4,12}$/;
    let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    let passwordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;

    document.querySelectorAll("small").forEach(e => e.innerHTML = "");

    let alertBox = document.getElementById("alertMessage");
    alertBox.classList.add("d-none");

    let isValid = true;

    if (!usernamePattern.test(username)) {
        document.getElementById("usernameError").innerHTML =
            "Username must be 4–12 characters (letters & numbers only)";
        isValid = false;
    }

    if (!emailPattern.test(email)) {
        document.getElementById("emailError").innerHTML =
            "Enter a valid email address";
        isValid = false;
    }

    if (!passwordPattern.test(password)) {
        document.getElementById("passwordError").innerHTML =
            "Password must be 8+ chars with uppercase, lowercase, number & symbol";
        isValid = false;
    }

    if (isValid) {
        alertBox.className = "alert alert-success text-center";
        alertBox.innerHTML = "Login Successful!";
        alertBox.classList.remove("d-none");
    } else {
        alertBox.className = "alert alert-danger text-center";
        alertBox.innerHTML = "Please fix the errors above.";
        alertBox.classList.remove("d-none");
    }

    return false;
}
</script>

</body>
</html>
