<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-150">
    <div class="card shadow" style="width: 1000px;">

        <div class="bg-success text-white text-center py-3 rounded-top">
            <h4 class="mb-0">Student Registration</h4>
        </div>

        <div class="p-4">
            <form onsubmit="return validateForm()" onreset="resetForm()">

                <div class="alert text-center d-none" id="alertMessage"></div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">First Name</label>
                        <input type="text" id="firstName" class="form-control">
                        <small class="text-danger" id="firstNameError"></small>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Last Name</label>
                        <input type="text" id="lastName" class="form-control">
                        <small class="text-danger" id="lastNameError"></small>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input type="text" id="email" class="form-control">
                        <small class="text-danger" id="emailError"></small>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Phone Number</label>
                        <input type="text" id="phone" class="form-control">
                        <small class="text-danger" id="phoneError"></small>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Age</label>
                        <input type="number" id="age" class="form-control">
                        <small class="text-danger" id="ageError"></small>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">College Name</label>
                        <input type="text" id="college" class="form-control">
                        <small class="text-danger" id="collegeError"></small>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Address</label>
                    <textarea id="address" class="form-control" rows="3"></textarea>
                    <small class="text-danger" id="addressError"></small>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary w-50">Submit</button>
                    <button type="reset" class="btn btn-secondary w-50">Reset</button>
                </div>

            </form>
        </div>
    </div>
</div>

<script>
function validateForm() {

    let firstName = document.getElementById("firstName").value.trim();
    let lastName = document.getElementById("lastName").value.trim();
    let email = document.getElementById("email").value.trim();
    let age = document.getElementById("age").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let college = document.getElementById("college").value.trim();
    let address = document.getElementById("address").value.trim();

    let namePattern = /^[A-Za-z]+$/;
    let phonePattern = /^[0-9]{10}$/;
    let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    document.querySelectorAll("small").forEach(e => e.innerHTML = "");

    let alertBox = document.getElementById("alertMessage");
    alertBox.classList.add("d-none");

    let isValid = true;

    if (!namePattern.test(firstName)) {
        document.getElementById("firstNameError").innerHTML = "Only alphabets allowed";
        isValid = false;
    }

    if (!namePattern.test(lastName)) {
        document.getElementById("lastNameError").innerHTML = "Only alphabets allowed";
        isValid = false;
    }

    if (!emailPattern.test(email)) {
        document.getElementById("emailError").innerHTML = "Enter valid email address";
        isValid = false;
    }

    if (age < 18 || age > 50) {
        document.getElementById("ageError").innerHTML = "Age must be between 18 and 50";
        isValid = false;
    }

    if (!phonePattern.test(phone)) {
        document.getElementById("phoneError").innerHTML = "Enter valid 10-digit phone number";
        isValid = false;
    }

    if (college === "") {
        document.getElementById("collegeError").innerHTML = "College name is required";
        isValid = false;
    }

    if (address === "") {
        document.getElementById("addressError").innerHTML = "Address is required";
        isValid = false;
    }

    if (isValid) {
        alertBox.className = "alert alert-success text-center";
        alertBox.innerHTML = "Registration Successful!";
        alertBox.classList.remove("d-none");
    } else {
        alertBox.className = "alert alert-danger text-center";
        alertBox.innerHTML = "Please fix the errors below.";
        alertBox.classList.remove("d-none");
    }

    return false;
}

function resetForm() {
    document.querySelectorAll("small").forEach(e => e.innerHTML = "");
    document.getElementById("alertMessage").classList.add("d-none");
}
</script>

</body>
</html>
